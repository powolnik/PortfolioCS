<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERNEL ACCESS: Portfolio AI</title>
    <style>
        :root {
            --color-bg: #0d0208;
            --color-text: #00ff41;
            --color-glow: rgba(0, 255, 65, 0.4);
            --color-error: #ff3300;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 0;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* CRT Effect Overlay */
        body::before {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        #left-panel {
            width: 40%; display: flex; flex-direction: column;
            border-right: 1px solid var(--color-text); padding: 20px; box-sizing: border-box;
        }

        #right-panel {
            width: 60%; position: relative; background: #000;
        }

        #terminal {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column;
            scrollbar-width: thin; scrollbar-color: var(--color-text) transparent;
        }

        .log { margin: 2px 0; line-height: 1.2; font-size: 14px; text-shadow: 0 0 5px var(--color-glow); }
        .log.system { color: #00ccff; font-weight: bold; }
        .log.warning { color: #ffcc00; }
        .log.error { color: #ff3300; }

        #input-area {
            display: flex; align-items: center; border-top: 1px solid var(--color-text);
            padding-top: 10px; margin-top: 10px;
        }

        #cmd-input {
            background: transparent; border: none; color: var(--color-text);
            font-family: inherit; font-size: 1.1em; flex-grow: 1; outline: none;
        }

        canvas { width: 100%; height: 100%; display: block; }

        #ui-overlay {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); padding: 5px 10px;
            border: 1px solid var(--color-text); font-size: 12px; pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body onclick="document.getElementById('cmd-input').focus()">
    
    <div id="left-panel">
        <div id="terminal">
            <div class="log system">[BOOT] AI Kernel 0.9.6 initialized...</div>
            <div class="log info">[INFO] World Engine: OPERATIONAL</div>
            <div class="log info">[INFO] Welcome, Authorized Guest. Type 'sudo help' for commands.</div>
        </div>

        <div id="input-area">
            <span style="margin-right:5px;">$</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off">
        </div>
    </div>

    <div id="right-panel">
        <div id="ui-overlay">POSITION: <span id="pos-display">0,0</span> | STABILITY: <span id="stab-display">100%</span></div>
        <canvas id="world-canvas"></canvas>
    </div>

    <script>
        // --- TERMINAL & LOGIC ---
        const terminal = document.getElementById('terminal');
        const input = document.getElementById('cmd-input');
        const posDisplay = document.getElementById('pos-display');
        const stabDisplay = document.getElementById('stab-display');

        let stability = 100;
        let isKilled = false;

        function addLog(text, type = 'info') {
            if (stability < 30 && type !== 'system' && Math.random() > 0.6) {
                text = text.split('').map(c => Math.random() > 0.2 ? c : '?').join('');
            }
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerText = text;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        const commands = {
            'sudo help': () => {
                addLog("> PORTFOLIO: whoami, ls, cat [proj], run [proj], contact", "info");
                addLog("> INTERFERENCE: inject_latency, spawn_deadlock, memory_leak, kill -9", "warning");
                addLog("> SYSTEM: status, clear, reboot", "info");
            },
            'help': () => addLog("Type 'sudo help' for full command list.", "warning"),
            'whoami': () => {
                addLog("--- USER PROFILE ---", "system");
                addLog("Name: [REDACTED]", "info");
                addLog("Role: Senior Software Engineer / C++ Specialist", "info");
            },
            'ls': () => addLog("> /projects: [hello_wasm, path_tracer, sorting_visualizer]", "info"),
            'status': () => addLog(`> STABILITY: ${stability}% | PROCESS_ID: 0x88AF2`, "info"),
            'clear': () => { terminal.innerHTML = ''; },
            'reboot': () => {
                stability = 100; isKilled = false;
                player.speed = 4;
                obstacles = []; slowZones = [];
                addLog("[INFO] System rebooted. Nominal state restored.", "system");
                stabDisplay.innerText = "100%";
            },
            'inject_latency': () => {
                addLog("[WARNING] Unauthorized interference detected. Recalculating path...", "warning");
                player.speed *= 0.7;
                updateStability(-15);
            },
            'spawn_deadlock': () => {
                addLog("[ERROR] Critical stability drop! Resource deadlock in Sector 7.", "error");
                obstacles.push({ x: player.x + 50, y: player.y + 50, w: 60, h: 20 });
                updateStability(-20);
            },
            'memory_leak': () => {
                addLog("[WARNING] Memory leak detected. Please optimize your behavior, Human.", "warning");
                slowZones.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, w: 100, h: 100 });
                updateStability(-10);
            },
            'kill -9': () => {
                addLog("[CRITICAL] KERNEL PANIC: Process killed by SIGKILL.", "error");
                isKilled = true;
                stability = 0;
                updateStability(0);
            },
            'cat': async (args) => {
                if (!args[0]) return addLog("[ERROR] cat: missing operand", "error");
                try {
                    const resp = await fetch(`/source/${args[0]}`);
                    const text = await resp.text();
                    text.split('\n').forEach(line => addLog(line, "info"));
                } catch(e) { addLog("[ERROR] File not found.", "error"); }
            }
        };

        function updateStability(val) {
            stability = Math.max(0, Math.min(100, stability + val));
            stabDisplay.innerText = stability + "%";
            if (stability < 30) stabDisplay.style.color = "red";
            else stabDisplay.style.color = "var(--color-text)";
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const parts = input.value.trim().split(' ');
                const cmd = parts[0] === 'sudo' ? 'sudo ' + (parts[1] || '') : parts[0];
                const args = parts.slice(parts[0] === 'sudo' ? 2 : 1);
                
                addLog(`$ ${input.value}`, 'system');
                if (isKilled && cmd !== 'reboot') {
                    addLog("SYSTEM HALTED.", "error");
                } else if (commands[cmd]) {
                    commands[cmd](args);
                } else if (cmd !== '') {
                    addLog(`[ERROR] Command not found: ${cmd}`, "error");
                }
                input.value = '';
            }
        });

        // --- 2D ENGINE ---
        const canvas = document.getElementById('world-canvas');
        const ctx = canvas.getContext('2d');
        let obstacles = [];
        let slowZones = [];

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const player = { x: 100, y: 100, speed: 4 };
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            if (isKilled) return;

            let currentSpeed = player.speed;
            
            // Slow Zones detection
            slowZones.forEach(zone => {
                if (player.x > zone.x && player.x < zone.x + zone.w && player.y > zone.y && player.y < zone.y + zone.h) {
                    currentSpeed *= 0.3;
                }
            });

            let nextX = player.x;
            let nextY = player.y;

            if (keys['ArrowUp'] || keys['KeyW']) nextY -= currentSpeed;
            if (keys['ArrowDown'] || keys['KeyS']) nextY += currentSpeed;
            if (keys['ArrowLeft'] || keys['KeyA']) nextX -= currentSpeed;
            if (keys['ArrowRight'] || keys['KeyD']) nextX += currentSpeed;

            // Obstacle Collision
            let collision = false;
            obstacles.forEach(obs => {
                if (nextX > obs.x && nextX < obs.x + obs.w && nextY > obs.y && nextY < obs.y + obs.h) {
                    collision = true;
                }
            });

            if (!collision) {
                player.x = Math.max(0, Math.min(canvas.width, nextX));
                player.y = Math.max(0, Math.min(canvas.height, nextY));
            }

            posDisplay.innerText = `${Math.round(player.x)},${Math.round(player.y)}`;
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = stability < 20 ? '#330000' : '#002200';
            ctx.lineWidth = 1;
            for(let x=0; x<canvas.width; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
            for(let y=0; y<canvas.height; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }

            // Slow Zones
            ctx.fillStyle = 'rgba(0, 255, 65, 0.1)';
            slowZones.forEach(zone => ctx.fillRect(zone.x, zone.y, zone.w, zone.h));

            // Obstacles
            ctx.fillStyle = '#aa0000';
            obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.w, obs.h));

            // Player
            ctx.fillStyle = isKilled ? '#ff0000' : '#00ff41';
            if (stability < 40 && !isKilled && Math.random() > 0.8) ctx.fillStyle = '#ffcc00';
            ctx.fillRect(player.x - 10, player.y - 10, 20, 20);

            requestAnimationFrame(() => { update(); draw(); });
        }
        draw();
    </script>
</body>
</html>
